<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hawk Eye – Cryptocurrency Market</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2310b981'/%3E%3C/svg%3E">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body{font-family:'Inter',sans-serif}
  .coin-icon{width:28px;height:28px;border-radius:50%}
  .sparkline{width:120px;height:40px}
  .loader{border-top-color:#10b981;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f3f4f6}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
</style>
</head>
<body class="bg-[#f9fafb]">
<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-[1440px] mx-auto px-4 lg:px-6 flex items-center h-14 gap-4 lg:gap-6">
    <a href="/" class="flex items-center gap-2 text-xl font-bold text-emerald-500 tracking-tight shrink-0">
      <svg class="w-7 h-7" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="42" r="30" stroke="currentColor" stroke-width="8"/>
        <circle cx="50" cy="42" r="12" fill="currentColor"/>
        <path d="M20 80 Q50 100 80 80" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
      </svg>HAWK EYE</a>
    <nav class="hidden sm:flex gap-1">
      <a href="/" class="text-emerald-500 px-3 py-2 text-sm font-semibold">Markets</a>
      <a href="/exchanges" class="text-gray-500 hover:text-gray-900 px-3 py-2 text-sm font-medium">Exchanges</a>
      <a href="/learn" class="text-gray-500 hover:text-gray-900 px-3 py-2 text-sm font-medium">Learn</a>
    </nav>
    <div class="flex-1 max-w-md mx-auto">
      <input id="globalSearch" type="text" placeholder="Search coins..." autocomplete="off"
        class="w-full bg-gray-100 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-emerald-500 focus:bg-white placeholder-gray-400 transition">
    </div>
  </div>
</header>
<div class="max-w-[1440px] mx-auto px-4 lg:px-6 py-6">
  <div class="flex flex-wrap gap-6 lg:gap-8 text-xs mb-8">
    <div><span class="text-gray-500">Market Cap</span><br><span id="totalMcap" class="text-sm font-semibold text-gray-900">--</span></div>
    <div><span class="text-gray-500">24h Volume</span><br><span id="totalVolume" class="text-sm font-semibold text-gray-900">--</span></div>
    <div><span class="text-gray-500">BTC Dominance</span><br><span id="btcDom" class="text-sm font-semibold text-gray-900">--</span></div>
    <div><span class="text-gray-500">Fear &amp; Greed</span><br><span id="fearGreedFull" class="text-sm font-semibold text-gray-900">--</span></div>
  </div>
  <div class="flex flex-col lg:flex-row gap-6">
    <div class="flex-1 min-w-0">
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5"><div class="text-xs text-gray-500 mb-1">Market Cap</div><div class="text-lg font-bold text-gray-900" id="mcapCard">--</div><div class="text-xs text-gray-400 mt-1" id="mcapChange">--</div></div>
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5"><div class="text-xs text-gray-500 mb-1">24h Volume</div><div class="text-lg font-bold text-gray-900" id="volCard">--</div><div class="text-xs text-gray-400 mt-1" id="volChange">--</div></div>
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5"><div class="text-xs text-gray-500 mb-1">BTC Price</div><div class="text-lg font-bold text-gray-900" id="btcPriceCard">--</div><div class="text-xs mt-1" id="btcChange">--</div></div>
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5"><div class="text-xs text-gray-500 mb-1">Fear &amp; Greed</div><div class="text-lg font-bold text-gray-900" id="fgValue">--</div><div class="text-xs text-gray-400 mt-1" id="fgClass">--</div></div>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5"><h3 class="text-sm font-semibold text-gray-900 mb-3">Top Gainers</h3><div id="gainersBox" class="space-y-3 text-xs"></div></div>
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5"><h3 class="text-sm font-semibold text-gray-900 mb-3">Top Losers</h3><div id="losersBox" class="space-y-3 text-xs"></div></div>
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5"><h3 class="text-sm font-semibold text-gray-900 mb-3">Trending</h3><div id="trendingBox" class="space-y-3 text-xs"></div></div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="text-gray-500 text-xs border-b border-gray-200 bg-gray-50/50"><th class="text-left py-3 px-4 font-semibold">#</th><th class="text-left py-3 px-4 font-semibold">Name</th><th class="text-right py-3 px-4 font-semibold">Price</th><th class="text-right py-3 px-4 font-semibold">1h</th><th class="text-right py-3 px-4 font-semibold">24h</th><th class="text-right py-3 px-4 font-semibold">7d</th><th class="text-right py-3 px-4 font-semibold hidden md:table-cell">Volume</th><th class="text-right py-3 px-4 font-semibold hidden md:table-cell">Market Cap</th><th class="text-right py-3 px-4 font-semibold hidden lg:table-cell">Chart</th><th></th></tr></thead>
            <tbody id="coinTableBody"></tbody>
          </table>
        </div>
      </div>
      <button onclick="loadMoreCoins()" class="mt-4 mx-auto block bg-white border border-gray-200 rounded-xl px-8 py-3 text-sm font-medium text-gray-600 hover:bg-gray-50 hover:border-gray-300 transition shadow-sm">Load More</button>
    </div>
    <aside class="hidden xl:block w-[340px] flex-shrink-0">
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 sticky top-20 max-h-[calc(100vh-120px)] overflow-hidden flex flex-col">
        <h3 class="text-sm font-semibold text-gray-900 mb-4 flex items-center gap-2"><span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>Market News</h3>
        <div id="sidebarNews" class="flex-1 overflow-y-auto space-y-4 text-xs"></div>
      </div>
    </aside>
  </div>
</div>
<div id="searchDropdown" class="hidden fixed top-14 left-1/2 -translate-x-1/2 w-[420px] max-w-[90vw] bg-white border border-gray-200 rounded-xl shadow-2xl z-50 max-h-96 overflow-y-auto"></div>
<script src="/static/js/app.js"></script>
</body>
</html>
