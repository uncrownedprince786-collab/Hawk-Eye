<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hawk Eye – Coin Analysis</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body{font-family:'Inter',sans-serif}
  .loader{border-top-color:#0ecb81;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f1f3f5}::-webkit-scrollbar-thumb{background:#ced4da;border-radius:3px}
</style>
</head>
<body class="bg-[#f8f9fa]">

<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-[1440px] mx-auto px-4 lg:px-6 flex items-center h-14 gap-4 lg:gap-6">
    <a href="/" class="text-xl font-bold text-[#0ecb81] tracking-tight shrink-0">HAWK EYE</a>
    <nav class="hidden sm:flex gap-1">
      <a href="/" class="text-gray-500 hover:text-gray-900 px-3 py-2 text-sm font-medium">Markets</a>
      <a href="/exchanges" class="text-gray-500 hover:text-gray-900 px-3 py-2 text-sm font-medium">Exchanges</a>
      <a href="/learn" class="text-gray-500 hover:text-gray-900 px-3 py-2 text-sm font-medium">Learn</a>
    </nav>
    <input id="coinSearch" type="text" placeholder="Search symbol…" autocomplete="off"
      class="ml-auto bg-gray-100 border border-gray-200 rounded-lg px-4 py-2 text-sm w-48 lg:w-64 focus:outline-none focus:border-[#0ecb81] focus:bg-white placeholder-gray-400 transition">
  </div>
</header>

<main class="max-w-[1440px] mx-auto px-4 lg:px-6 py-5">
  <div class="flex flex-wrap items-center gap-3 lg:gap-4 mb-5">
    <h1 id="coinName" class="text-2xl font-bold text-gray-900">--</h1>
    <span id="coinPrice" class="text-2xl font-bold text-gray-900">--</span>
    <span id="coinChange" class="text-sm font-semibold px-2.5 py-1 rounded-lg"></span>
    <span class="text-xs text-gray-400 ml-auto">Auto-refreshing</span>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-4 gap-5">
    <div class="xl:col-span-3 space-y-5">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
        <div id="tvChart" style="height:520px"></div>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-semibold text-gray-900">Hawk Eye Trade Plan</h3>
          <span class="text-xs text-gray-400">Powered by self-contained engine</span>
        </div>
        <pre id="tradePlan" class="text-sm leading-relaxed whitespace-pre-wrap max-h-[500px] overflow-y-auto bg-gray-50 rounded-lg p-4 border border-gray-100 text-gray-700">Click GENERATE to analyze this asset.</pre>
        <button onclick="generateTradePlan()" class="mt-4 w-full bg-[#0ecb81] hover:bg-[#0ab06e] text-white font-semibold py-3 rounded-xl transition text-sm shadow-sm">GENERATE TRADE PLAN</button>
      </div>
    </div>

    <div class="space-y-5">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Order Book</h3>
        <div id="orderBook" class="text-xs max-h-72 overflow-y-auto font-mono"></div>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Statistics</h3>
        <div id="priceStats" class="space-y-1.5 text-xs"></div>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">News</h3>
        <div id="newsFeed" class="space-y-2 text-xs max-h-64 overflow-y-auto"></div>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Sentiment</h3>
        <div id="sentimentData" class="text-sm"></div>
      </div>
    </div>
  </div>
</main>

<script src="/static/js/app.js"></script>
</body>
</html>
