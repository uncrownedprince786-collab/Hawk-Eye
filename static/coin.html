<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hawk Eye – Coin Analysis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .loader { border-top-color: #f0b90b; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-950 text-gray-200">
  <header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex items-center h-14 gap-6">
      <a href="/" class="text-xl font-bold text-yellow-500 tracking-wider">HAWK EYE</a>
      <nav class="flex gap-4 text-sm">
        <a href="/" class="text-gray-400 hover:text-gray-200">Coins</a>
        <a href="/exchanges" class="text-gray-400 hover:text-gray-200">Exchanges</a>
        <a href="/learn" class="text-gray-400 hover:text-gray-200">Learn</a>
      </nav>
      <input id="coinSearch" type="text" placeholder="Search…" autocomplete="off"
             class="ml-auto bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm w-64 focus:outline-none focus:border-yellow-500">
      <button id="themeToggle" class="text-lg" title="Toggle theme">??</button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-4">
      <h1 id="coinName" class="text-2xl font-bold">--</h1>
      <div class="flex items-baseline gap-2">
        <span id="coinPrice" class="text-2xl font-bold">--</span>
        <span id="coinChange" class="text-sm font-medium"></span>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Main chart + trade plan -->
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-gray-900 rounded-lg border border-gray-800 p-4">
          <h3 class="text-yellow-500 font-semibold mb-3">Live Chart</h3>
          <div id="tvChart" style="height:500px"></div>
        </div>
        <div class="bg-gray-900 rounded-lg border border-gray-800 p-4">
          <h3 class="text-yellow-500 font-semibold mb-3">Hawk Eye Trade Plan</h3>
          <pre id="tradePlan" class="text-sm whitespace-pre-wrap max-h-96 overflow-y-auto">Click GENERATE to get analysis.</pre>
          <button class="mt-3 w-full bg-yellow-500 hover:bg-yellow-600 text-black font-semibold py-2 rounded" onclick="generateTradePlan()">GENERATE TRADE PLAN</button>
        </div>
      </div>

      <!-- Sidebar: order book, stats, news -->
      <div class="space-y-6">
        <div class="bg-gray-900 rounded-lg border border-gray-800 p-4">
          <h3 class="text-yellow-500 font-semibold mb-3">Order Book</h3>
          <div id="orderBook" class="text-xs max-h-64 overflow-y-auto"></div>
        </div>
        <div class="bg-gray-900 rounded-lg border border-gray-800 p-4">
          <h3 class="text-yellow-500 font-semibold mb-3">Price Statistics</h3>
          <div id="priceStats" class="space-y-1 text-sm"></div>
        </div>
        <div class="bg-gray-900 rounded-lg border border-gray-800 p-4">
          <h3 class="text-yellow-500 font-semibold mb-3">Latest News</h3>
          <div id="newsFeed" class="space-y-2 text-sm"></div>
        </div>
        <div class="bg-gray-900 rounded-lg border border-gray-800 p-4">
          <h3 class="text-yellow-500 font-semibold mb-3">Market Sentiment</h3>
          <div id="sentimentData" class="text-sm"></div>
        </div>
      </div>
    </div>
  </main>

<script>
const API = '';
const L = '<div class="loader w-6 h-6 border-2 border-gray-600 rounded-full mx-auto"></div>';

function fP(p) { return p ? (p >= 1 ? '$' + p.toLocaleString() : '$' + p.toFixed(6)) : '--'; }
function fL(n) { return n ? (n >= 1e12 ? '$' + (n/1e12).toFixed(2) + 'T' : n >= 1e9 ? '$' + (n/1e9).toFixed(2) + 'B' : n >= 1e6 ? '$' + (n/1e6).toFixed(2) + 'M' : '$' + n.toLocaleString()) : '--'; }
function fC(v) { return v == null ? '--' : '<span class="' + (v >= 0 ? 'text-green-400' : 'text-red-400') + '">' + (v >= 0 ? '+' : '') + v.toFixed(2) + '%</span>'; }

// Theme toggle
(function() {
  const btn = document.getElementById('themeToggle');
  if (!btn) return;
  let theme = localStorage.getItem('hawk-theme') || 'dark';
  document.documentElement.classList.toggle('dark', theme === 'dark');
  btn.textContent = theme === 'dark' ? '??' : '??';
  btn.addEventListener('click', () => {
    theme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
    document.documentElement.classList.toggle('dark', theme === 'dark');
    localStorage.setItem('hawk-theme', theme);
    btn.textContent = theme === 'dark' ? '??' : '??';
  });
})();

const p = new URLSearchParams(location.search);
const sym = p.get('symbol') || 'BTCUSDT';

// TradingView chart
function initChart() {
  const isCrypto = sym.endsWith('USDT') || sym.endsWith('USD') || sym === 'BTCUSDT';
  const symbol = isCrypto ? 'BINANCE:' + sym.replace('USDT','') + 'USDT' : sym;
  new TradingView.widget({
    container_id: 'tvChart',
    autosize: true,
    symbol: symbol,
    interval: '60',
    timezone: 'Etc/UTC',
    theme: 'dark',
    style: '1',
    locale: 'en',
    toolbar_bg: '#f1f3f6',
    enable_publishing: false,
    hide_side_toolbar: false,
    allow_symbol_change: false,
    studies: ['RSI@tv-basicstudies', 'MACD@tv-basicstudies'],
    disabled_features: ['header_symbol_search', 'header_compare'],
    enabled_features: ['study_templates']
  });
}
initChart();

async function loadCoinData() {
  document.getElementById('newsFeed').innerHTML = L;
  try {
    const r = await fetch(API + '/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol: sym })
    });
    const d = await r.json();
    const sn = d.data_snapshot;
    if (!sn) return;
    const pr = sn.price_data;
    document.getElementById('coinName').textContent = sym;
    document.getElementById('coinPrice').textContent = fP(pr.price);
    const ch = pr.change_pct || 0;
    document.getElementById('coinChange').innerHTML = (ch >= 0 ? '+' : '') + ch.toFixed(2) + '%';
    document.getElementById('coinChange').className = 'text-sm font-medium ' + (ch >= 0 ? 'text-green-400' : 'text-red-400');

    const cg = sn.coingecko || {};
    document.getElementById('priceStats').innerHTML = `
      <div class="flex justify-between"><span class="text-gray-400">24h High</span><span>${fP(cg.high_24h)}</span></div>
      <div class="flex justify-between"><span class="text-gray-400">24h Low</span><span>${fP(cg.low_24h)}</span></div>
      <div class="flex justify-between"><span class="text-gray-400">All-Time High</span><span>${fP(cg.ath)}</span></div>
      <div class="flex justify-between"><span class="text-gray-400">All-Time Low</span><span>${fP(cg.atl)}</span></div>
      <div class="flex justify-between"><span class="text-gray-400">Market Cap</span><span>${fL(cg.market_cap)}</span></div>
      <div class="flex justify-between"><span class="text-gray-400">24h Volume</span><span>${fL(cg.total_volume)}</span></div>
      <div class="flex justify-between"><span class="text-gray-400">Circ. Supply</span><span>${cg.circulating_supply ? (cg.circulating_supply/1e6).toFixed(2)+'M' : '--'}</span></div>
      <div class="flex justify-between"><span class="text-gray-400">Max Supply</span><span>${cg.max_supply ? (cg.max_supply/1e6).toFixed(2)+'M' : 'Unlimited'}</span></div>`;

    // coin-specific news
    const newsResp = await fetch(API + '/api/news?symbol=' + sym);
    const newsData = await newsResp.json();
    const nw = Array.isArray(newsData) ? newsData : (sn.news || []);
    document.getElementById('newsFeed').innerHTML = nw.length ? nw.map(n => `
      <div class="border-b border-gray-800 pb-2">
        <div class="text-blue-400 text-xs font-medium">${n.headline || n.title}</div>
        <div class="text-gray-500 text-xs mt-0.5">${(n.summary || n.description || '').slice(0,150)}</div>
      </div>
    `).join('') : '<p class="text-gray-500">No news.</p>';

    const fg = sn.fear_greed || {};
    document.getElementById('sentimentData').innerHTML = `<span class="text-gray-400">Fear & Greed:</span> ${fg.value || '--'} - ${fg.classification || '--'}`;

    // Order book
    loadOrderBook(sym);
  } catch(e) { console.error(e); }
}

async function loadOrderBook(symbol) {
  const ob = document.getElementById('orderBook');
  if (!ob) return;
  ob.innerHTML = L;
  try {
    const r = await fetch('https://api.binance.com/api/v3/depth?symbol=' + symbol + '&limit=10');
    const d = await r.json();
    let html = '';
    for (let i = 9; i >= 0; i--) {
      if (d.bids[i]) html += `<div class="flex justify-between text-green-400"><span>${parseFloat(d.bids[i][0]).toFixed(2)}</span><span>${parseFloat(d.bids[i][1]).toFixed(4)}</span></div>`;
    }
    html += '<div class="border-t border-gray-700 my-2"></div>';
    for (let i = 0; i < 10; i++) {
      if (d.asks[i]) html += `<div class="flex justify-between text-red-400"><span>${parseFloat(d.asks[i][0]).toFixed(2)}</span><span>${parseFloat(d.asks[i][1]).toFixed(4)}</span></div>`;
    }
    ob.innerHTML = html;
  } catch(e) { ob.innerHTML = '<p class="text-gray-500">Order book unavailable.</p>'; }
}

async function generateTradePlan() {
  document.getElementById('tradePlan').innerHTML = '<p>Generating…</p>';
  try {
    const r = await fetch(API + '/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol: sym })
    });
    const d = await r.json();
    document.getElementById('tradePlan').textContent = d.trade_plan || 'Failed.';
  } catch(e) { document.getElementById('tradePlan').innerHTML = '<p class="text-red-400">Error.</p>'; }
}

// Search
const si = document.getElementById('coinSearch');
if (si) {
  si.addEventListener('input', async function() {
    const q = this.value.trim();
    if (q.length < 1) return;
    try {
      const r = await fetch('https://api.coingecko.com/api/v3/search?query=' + q);
      const d = await r.json();
      // simple redirect to first result
      if (d.coins && d.coins.length > 0) {
        location.href = '/coin?symbol=' + d.coins[0].symbol.toUpperCase() + 'USDT';
      }
    } catch(e) {}
  });
}

document.addEventListener('DOMContentLoaded', loadCoinData);
</script>
</body>
</html>
