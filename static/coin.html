<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hawk Eye - Trading Analysis</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body{font-family:'Inter',sans-serif;background:#0b0e11;color:#eaecef}
  .loader{border-top-color:#f0b90b;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#1e2329}::-webkit-scrollbar-thumb{background:#2b3139;border-radius:3px}
</style>
</head>
<body class="bg-[#0b0e11] text-[#eaecef]">
<header class="bg-[#1e2329] border-b border-[#2b3139] sticky top-0 z-50">
  <div class="max-w-[1440px] mx-auto px-4 flex items-center h-14 gap-6">
    <a href="/" class="text-xl font-bold text-[#f0b90b] tracking-wide">HAWK EYE</a>
    <nav class="flex gap-1">
      <a href="/" class="text-[#848e9c] hover:text-white px-3 py-2 text-sm">Markets</a>
      <a href="/exchanges" class="text-[#848e9c] hover:text-white px-3 py-2 text-sm">Exchanges</a>
      <a href="/learn" class="text-[#848e9c] hover:text-white px-3 py-2 text-sm">Learn</a>
    </nav>
    <input id="coinSearch" type="text" placeholder="Search symbol..." autocomplete="off"
      class="ml-auto bg-[#0b0e11] border border-[#2b3139] rounded-lg px-4 py-2 text-sm w-64 focus:outline-none focus:border-[#f0b90b] placeholder-gray-500">
  </div>
</header>

<main class="max-w-[1440px] mx-auto px-4 py-5">
  <div class="flex items-center gap-4 mb-5">
    <h1 id="coinName" class="text-2xl font-bold">--</h1>
    <span id="coinPrice" class="text-2xl font-bold">--</span>
    <span id="coinChange" class="text-sm font-semibold px-2 py-1 rounded"></span>
    <span class="text-xs text-[#848e9c] ml-auto">Data refreshes live</span>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-4 gap-5">
    <div class="xl:col-span-3 space-y-5">
      <div class="bg-[#1e2329] rounded-xl border border-[#2b3139] overflow-hidden">
        <div id="tvChart" style="height:520px"></div>
      </div>
      <div class="bg-[#1e2329] rounded-xl border border-[#2b3139] p-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-semibold text-[#f0b90b]">Trade Plan</h3>
          <span class="text-xs text-[#848e9c]">Auto-generated by Hawk Eye engine</span>
        </div>
        <pre id="tradePlan" class="text-sm leading-relaxed whitespace-pre-wrap max-h-[500px] overflow-y-auto bg-[#0b0e11] rounded-lg p-4 border border-[#2b3139]">Click GENERATE to analyze this asset.</pre>
        <button onclick="generateTradePlan()" class="mt-4 w-full bg-[#f0b90b] hover:bg-[#c99a08] text-black font-bold py-3 rounded-lg transition text-sm">GENERATE TRADE PLAN</button>
      </div>
    </div>

    <div class="space-y-5">
      <div class="bg-[#1e2329] rounded-xl border border-[#2b3139] p-4">
        <h3 class="text-xs font-semibold text-[#848e9c] uppercase tracking-wider mb-3">Order Book</h3>
        <div id="orderBook" class="text-xs max-h-72 overflow-y-auto font-mono"></div>
      </div>
      <div class="bg-[#1e2329] rounded-xl border border-[#2b3139] p-4">
        <h3 class="text-xs font-semibold text-[#848e9c] uppercase tracking-wider mb-3">Statistics</h3>
        <div id="priceStats" class="space-y-2 text-xs"></div>
      </div>
      <div class="bg-[#1e2329] rounded-xl border border-[#2b3139] p-4">
        <h3 class="text-xs font-semibold text-[#848e9c] uppercase tracking-wider mb-3">News</h3>
        <div id="newsFeed" class="space-y-2 text-xs max-h-64 overflow-y-auto"></div>
      </div>
      <div class="bg-[#1e2329] rounded-xl border border-[#2b3139] p-4">
        <h3 class="text-xs font-semibold text-[#848e9c] uppercase tracking-wider mb-3">Sentiment</h3>
        <div id="sentimentData" class="text-sm"></div>
      </div>
    </div>
  </div>
</main>

<script src="/static/js/app.js"></script>
</body>
</html>
